<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KingTrader - Sign Up</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>KingTrader Sign Up</h1>

<p>Create Your Professional Account</p>

<form id="signupForm">

<input id="fullName" type="text" placeholder="Full Name" required><br><br>

<input id="email" type="email" placeholder="Email Address" required><br><br>

<input id="password" type="password" placeholder="Password" required><br><br>

<input id="confirmPassword" type="password" placeholder="Confirm Password" required><br><br>

<button type="submit">
Create Account
</button>

</form>

<br>

<a href="login.html">
Already have an account? Login
</a>

</div>

<script type="module" src="script.js"></script>
